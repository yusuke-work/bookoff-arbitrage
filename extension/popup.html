<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>利益リサーチ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      width: 400px;
      min-height: 300px;
      color: #333;
    }

    header {
      background: #e53935;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
    }

    .body { padding: 12px 16px; }

    /* 閾値設定 */
    .settings {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .settings h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .setting-row input {
      width: 90px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      text-align: right;
    }

    /* ボタン */
    #startBtn {
      width: 100%;
      padding: 10px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    #startBtn:disabled { background: #bbb; cursor: not-allowed; }

    /* 進捗 */
    #progress {
      display: none;
      margin-top: 12px;
      font-size: 13px;
      color: #555;
    }
    .progress-bar-outer {
      background: #e0e0e0;
      border-radius: 4px;
      height: 8px;
      margin: 6px 0;
      overflow: hidden;
    }
    .progress-bar-inner {
      background: #e53935;
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    /* 結果リスト */
    #results {
      margin-top: 12px;
      max-height: 350px;
      overflow-y: auto;
      padding-right: 4px; /* スクロールバー用の余白 */
    }
    .result-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .result-title { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    .result-detail { font-size: 12px; color: #555; line-height: 1.6; }
    .profit-badge {
      display: inline-block;
      background: #43a047;
      color: #fff;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 4px;
    }
    .result-link { font-size: 11px; color: #1565c0; text-decoration: none; }

    /* エラー */
    #errorMsg {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #ffebee;
      border-radius: 6px;
      color: #c62828;
      font-size: 12px;
    }

    /* 空メッセージ */
    #emptyMsg {
      display: none;
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>📦 ブックオフ → メルカリ 利益リサーチ</header>
  <div class="body">

    <!-- 閾値設定 -->
    <div class="settings">
      <h3>⚙ 利益判定の閾値</h3>
      <div class="setting-row">
        <label>最低利益額</label>
        <span><input type="number" id="minProfit" value="500" min="0" step="50"> 円以上</span>
      </div>
      <div class="setting-row">
        <label>最低利益率</label>
        <span><input type="number" id="minMargin" value="30" min="0" step="5"> ％以上</span>
      </div>
    </div>

    <button id="startBtn">▶ このページを調査する</button>

    <div id="errorMsg"></div>

    <div id="progress">
      <div id="progressText">調査中... 0 / 0</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar"></div>
      </div>
    </div>

    <div id="emptyMsg">利益が出る商品は見つかりませんでした</div>
    <div id="results"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
